<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout — SAFE</title>
<meta name="description" content="Secure checkout — SAFE">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .checkout-container {
    max-width: 900px;
    margin: 60px auto;
    padding: 0 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
  }

  @media (max-width: 768px) {
    .checkout-container {
      grid-template-columns: 1fr;
      gap: 40px;
    }
  }

  .checkout-section h2 {
    font-size: 20px;
    font-weight: 500;
    margin-bottom: 24px;
  }

  .order-summary {
    border: 1px solid var(--border);
    padding: 24px;
    border-radius: 0;
  }

  .summary-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 0;
    border-bottom: 1px solid var(--border);
  }

  .summary-item:last-child {
    border-bottom: none;
  }

  .item-info h3 {
    font-size: 14px;
    font-weight: 500;
    margin: 0 0 4px 0;
  }

  .item-info p {
    font-size: 12px;
    color: var(--mid);
    margin: 0;
  }

  .item-price {
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
  }

  .summary-totals {
    margin-top: 24px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }

  .summary-row {
    display: flex;
    justify-content: space-between;
    margin: 8px 0;
    font-size: 14px;
  }

  .summary-row.total {
    font-size: 18px;
    font-weight: 500;
    margin-top: 16px;
  }

  .checkout-form {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .form-group label {
    font-size: 14px;
    font-weight: 500;
  }

  .form-group input,
  .form-group select {
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 0;
    font-size: 14px;
    font-family: inherit;
    background: var(--bg);
    color: var(--text);
  }

  .form-group input:focus,
  .form-group select:focus {
    outline: none;
    border-color: var(--text);
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .pay-btn {
    background: var(--text);
    color: var(--bg);
    padding: 14px 32px;
    border: 1px solid var(--text);
    border-radius: 0;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.2s;
  }

  .pay-btn:hover {
    background: var(--bg);
    color: var(--text);
  }

  .pay-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .continue-shopping {
    display: inline-block;
    color: var(--text);
    text-decoration: underline;
    font-size: 13px;
    margin-top: 16px;
  }

  .cart-empty {
    text-align: center;
    padding: 60px 20px;
    font-size: 16px;
    line-height: 1.6;
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="home-logo" aria-label="Home">
    <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 2 11 L 10 3 L 18 11"/>
      <path d="M 2 11 L 2 18 L 18 18 L 18 11"/>
    </svg>
  </a>

  <button class="nav-toggle" aria-label="Open menu" aria-haspopup="dialog" aria-expanded="false"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true" width="20" height="20"><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2.5"/><path d="M 18 8 L 20 6 L 22 8" stroke-linecap="round" stroke-linejoin="round"/></svg></button>

  <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">
    <svg class="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="18" height="18">
      <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
  </button>
</nav>

<section class="checkout-container" id="checkoutContent">
  <div class="checkout-section">
    <h2>Order Summary</h2>
    <div class="order-summary" id="orderSummary">
      <!-- Items will be rendered here -->
    </div>
  </div>

  <div class="checkout-section">
    <h2>Shipping & Payment</h2>
    <form class="checkout-form" id="checkoutForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div class="form-group">
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" name="fullname" required>
      </div>

      <div class="form-group">
        <label for="address">Address</label>
        <input type="text" id="address" name="address" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="city">City</label>
          <input type="text" id="city" name="city" required>
        </div>
        <div class="form-group">
          <label for="postcode">Postcode</label>
          <input type="text" id="postcode" name="postcode" required>
        </div>
      </div>

      <div class="form-group">
        <label for="shipping">Shipping Method</label>
        <select id="shipping" name="shipping" required>
          <option value="">Select shipping...</option>
          <option value="free">Free shipping (orders over £100)</option>
          <option value="standard">Standard shipping (5-7 business days) - £10</option>
        </select>
      </div>

      <button type="submit" class="pay-btn" id="payBtn">Proceed to Payment</button>
      <a href="shop.html" class="continue-shopping">← Back to Shop</a>
    </form>
  </div>
</section>

<footer>
  <span class="footer-left">S·A·F·E — Steps Approaching Future Earth</span>
  <span class="footer-right" style="display: flex; gap: 24px; font-size: 11px;">
    <a href="help.html" style="colour: inherit; text-decoration: none;">Help</a>
    <a href="privacy.html" style="colour: inherit; text-decoration: none;">Privacy</a>
    <a href="terms.html" style="colour: inherit; text-decoration: none;">Terms</a>
    <a href="privacy-choices.html" style="colour: inherit; text-decoration: none;">Choices</a>
    <a href="accessibility.html" style="colour: inherit; text-decoration: none;">Access</a>
    <a href="https://hughcorduroy.bandcamp.com/" target="_blank" rel="noopener" style="colour: inherit; text-decoration: none;">Music</a>
  </span>
</footer>

<script>
function renderCheckout() {
  const cart = JSON.parse(localStorage.getItem('safeCart')) || [];
  const checkoutContent = document.getElementById('checkoutContent');
  const orderSummary = document.getElementById('orderSummary');

  if (cart.length === 0) {
    checkoutContent.innerHTML = `
      <div class="cart-empty">
        <p>Your cart is empty.</p>
        <a href="shop.html" class="continue-shopping">Continue shopping</a>
      </div>
    `;
    return;
  }

  let html = '';
  let total = 0;

  cart.forEach(item => {
    total += item.price;
    html += `
      <div class="summary-item">
        <div class="item-info">
          <h3>${item.name}</h3>
          <p>Colour: ${item.color} | Size: ${item.size}</p>
        </div>
        <div class="item-price">£${item.price.toFixed(2)}</div>
      </div>
    `;
  });

  html += `
    <div class="summary-totals">
      <div class="summary-row">
        <span>Subtotal:</span>
        <span>£${total.toFixed(2)}</span>
      </div>
      <div class="summary-row">
        <span>Shipping:</span>
        <span id="shippingPrice">TBD</span>
      </div>
      <div class="summary-row total">
        <span>Total:</span>
        <span id="totalPrice">£${total.toFixed(2)}</span>
      </div>
    </div>
  `;

  orderSummary.innerHTML = html;

  // Update shipping price when selected
  document.getElementById('shipping').addEventListener('change', function() {
    let shippingCost = 0;
    if (this.value === 'standard') {
      shippingCost = 10;
    }
    document.getElementById('shippingPrice').textContent = shippingCost === 0 ? 'Free' : '£' + shippingCost.toFixed(2);
    document.getElementById('totalPrice').textContent = '£' + (total + shippingCost).toFixed(2);
  });
}

document.getElementById('checkoutForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  const cart = JSON.parse(localStorage.getItem('safeCart')) || [];
  if (cart.length === 0) {
    alert('Your cart is empty');
    return;
  }

  const btn = document.getElementById('payBtn');
  btn.disabled = true;
  btn.textContent = 'Processing...';

  try {
    const response = await fetch('/api/checkout', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ items: cart })
    });

    const data = await response.json();

    if (data.error) {
      alert('Error: ' + data.error);
      btn.disabled = false;
      btn.textContent = 'Proceed to Payment';
      return;
    }

    // Redirect to Stripe Checkout
    window.location.href = `https://checkout.stripe.com/pay/${data.sessionId}`;
  } catch (error) {
    console.error('Checkout error:', error);
    alert('Error processing checkout. Please try again.');
    btn.disabled = false;
    btn.textContent = 'Proceed to Payment';
  }
});

document.addEventListener('DOMContentLoaded', renderCheckout);
</script>

<script src="theme.js"></script>
</body>
</html>
